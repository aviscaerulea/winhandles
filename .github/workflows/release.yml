# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
      APP_NAME: winhandles
      ARCH: x64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ env.ARCH }}

      - name: Build (Release)
        shell: pwsh
        run: pwsh -NoProfile -File build.ps1 -Version $env:VERSION

      - name: Create zip package
        shell: pwsh
        run: |
          $zipName = "$env:APP_NAME-$env:TAG_NAME-$env:ARCH.zip"
          $files = @("out/$env:APP_NAME.exe")
          if (Test-Path "$env:APP_NAME.toml") { $files += "$env:APP_NAME.toml" }
          Compress-Archive -Path $files -DestinationPath "out/$zipName" -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload release asset
        shell: bash
        run: gh release upload "$TAG_NAME" "out/$ZIP_NAME" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
